version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: neri-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neri
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d neri"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neri-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: neri-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@neri.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - neri-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neri-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=neri
      - DB_PORT=5432
      - JWT_SECRET=supersecretkey
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neri-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neri-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neri-network

networks:
  neri-network:
    driver: bridge

volumes:
  pgdata:
